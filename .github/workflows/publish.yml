name: Publish book (gh-pages)

# Build the book and push it to the gh-pages branch (the live Pages source).
# Renders the live-html (webR/quarto-live) book; HTML only, no PDF.

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}   # for renv installing the GitHub-sourced itssl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.6.32'

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'

      - name: Restore renv library
        uses: r-lib/actions/setup-renv@v2

      - name: Render book (live-html; webR/quarto-live)
        run: quarto render --to live-html

      - name: Publish prebuilt site to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false   # publish the docs/ we just rendered; no re-render, no LaTeX/PDF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
