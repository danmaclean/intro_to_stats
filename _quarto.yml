project:
  type: book
  output-dir: docs

book:
  title: "Understanding Statistics Through Linear Models"
  author: "Dan MacLean"
  date: "May 2022"
  search: true
  downloads: [pdf]
  sharing: [twitter, facebook]
  chapters: 
    - index.qmd
    - part: "Background"
      chapters:
        - 01-background.qmd
        - 02-linear-models.qmd
    - part: "Common statistical tests"
      chapters:
        - 03-ttest.qmd
        - 04-anova.qmd
        - 05-discrete.qmd
        - 06-loglinear.qmd
    - part: "More applications of linear models"
      chapters:
        - 07-testing_model.qmd
        - 08-predictions.qmd
    - part: "Beyond linear models"
      chapters:
        - 09-glms.qmd
  appendices:
    - prerequisites.qmd
    - r-fundamentals.qmd
    - acknowledgements.qmd

bibliography: references.bib

engine: knitr

# Keep R warnings / package messages out of the rendered (reader-facing) output.
execute:
  warning: false
  message: false

# naquiz: multiple-choice questions (::: {.question}) for migrated exercises.
filters:
  - naquiz

# webR (quarto-live) config: runnable {webr} cells install itssl from the
# course r-universe; dependencies come from repo.r-wasm.org. Only chapters that
# include the live setup + use {webr} cells become interactive.
webr:
  packages:
    - itssl
    - ggplot2
    - palmerpenguins
    - multcomp
  repos:
    - https://danmaclean.r-universe.dev
    - https://repo.r-wasm.org

format:
  live-html:
    theme: cosmo
    css: webr-ui.css
  pdf:
    documentclass: scrreprt
comments:
  hypothesis: true